# PURPOSE: Run OpenHarness MCP contract conformance (tool names vs scp_mcp_v1).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: MCP contract v1 (pytest)
        run: pytest tests/test_mcp_contract_v1.py -v
